<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>슬픔냠냠 슬라임</title>
  <style>
    :root {
      --bg1: #f7fbff;
      --bg2: #eef0ff;
      --ink: #243047;
      --muted: #717891;
      --card: rgba(255, 255, 255, 0.78);
      --card-border: rgba(255, 255, 255, 0.8);
      --shadow: 0 24px 80px rgba(68, 82, 130, 0.18);
      --sadness: #8ed8ff;
      --depression: #1d2c5f;
      --avoidance: #9b6ee8;
      --loneliness: #ffad54;
      --slime-main: #91e8d4;
      --slime-dark: #5ccab8;
      --slime-light: #d9fff7;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(142,216,255,0.35), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(255,173,84,0.22), transparent 26%),
        radial-gradient(circle at 45% 80%, rgba(155,110,232,0.18), transparent 34%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .app {
      width: min(460px, 100%);
      min-height: min(760px, calc(100vh - 40px));
      border-radius: 32px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 22px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .app::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.48);
      top: -130px;
      right: -110px;
      pointer-events: none;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding-top: 4px;
    }

    h1 {
      font-size: 24px;
      margin: 0;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .stage {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 0 10px;
      z-index: 1;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.9);
      color: #596078;
      padding: 8px 12px;
      font-size: 12px;
      box-shadow: 0 8px 28px rgba(65, 84, 125, 0.08);
      margin-bottom: 20px;
      user-select: none;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--slime-dark);
      box-shadow: 0 0 0 4px rgba(92, 202, 184, 0.13);
    }

    .slime-zone {
      width: 250px;
      height: 250px;
      display: grid;
      place-items: center;
      position: relative;
      margin: 2px 0 12px;
    }

    .floor-shadow {
      position: absolute;
      width: 178px;
      height: 32px;
      border-radius: 50%;
      background: rgba(58, 70, 113, 0.12);
      bottom: 20px;
      filter: blur(2px);
      transform: scaleX(1);
      animation: shadowPulse 3.8s ease-in-out infinite;
    }

    .slime {
      --scale: 1;
      width: 150px;
      height: 132px;
      background:
        radial-gradient(circle at 33% 23%, var(--slime-light) 0 12%, transparent 13%),
        linear-gradient(150deg, rgba(255,255,255,0.42), transparent 36%),
        linear-gradient(180deg, var(--slime-main), var(--slime-dark));
      border-radius: 54% 56% 45% 48% / 58% 58% 42% 42%;
      position: relative;
      transform: scale(var(--scale));
      box-shadow:
        inset -14px -18px 0 rgba(28, 94, 91, 0.08),
        inset 10px 13px 0 rgba(255,255,255,0.2),
        0 22px 45px rgba(56, 120, 135, 0.23);
      animation: idle 3.8s ease-in-out infinite;
      transition: width .35s ease, height .35s ease, background .35s ease, transform .35s ease, border-radius .35s ease;
      cursor: pointer;
      user-select: none;
    }

    .slime::before {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: -9px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      filter: blur(8px);
    }

    .slime .face {
      position: absolute;
      left: 50%;
      top: 58%;
      width: 86px;
      height: 54px;
      transform: translate(-50%, -50%);
    }

    .eye {
      position: absolute;
      width: 14px;
      height: 18px;
      border-radius: 50%;
      background: #263248;
      top: 2px;
      box-shadow: inset 3px 3px 0 rgba(255,255,255,0.28);
      transition: .18s ease;
    }

    .eye.left { left: 16px; }
    .eye.right { right: 16px; }

    .mouth {
      position: absolute;
      left: 50%;
      top: 31px;
      width: 28px;
      height: 13px;
      transform: translateX(-50%);
      border-bottom: 4px solid #263248;
      border-radius: 0 0 20px 20px;
      transition: .18s ease;
    }

    .cheek {
      position: absolute;
      top: 28px;
      width: 13px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 126, 150, 0.25);
    }

    .cheek.left { left: 1px; }
    .cheek.right { right: 1px; }

    .slime.sadness {
      --slime-main: #9ee4ff;
      --slime-dark: #63bee7;
      --slime-light: #e9fbff;
    }

    .slime.depression {
      --slime-main: #566aa8;
      --slime-dark: #1d2c5f;
      --slime-light: #aebdff;
    }

    .slime.avoidance {
      --slime-main: #c6a5ff;
      --slime-dark: #8357d5;
      --slime-light: #f3eaff;
    }

    .slime.loneliness {
      --slime-main: #ffc476;
      --slime-dark: #f08d35;
      --slime-light: #fff0cd;
    }

    .slime.final {
      --slime-main: #b9f2df;
      --slime-dark: #78cdbf;
      --slime-light: #ffffff;
      border-radius: 53% 47% 43% 48% / 58% 56% 44% 42%;
      box-shadow:
        inset -18px -22px 0 rgba(28, 94, 91, 0.07),
        inset 13px 16px 0 rgba(255,255,255,0.24),
        0 28px 58px rgba(56, 120, 135, 0.22);
    }

    .slime.evo-1 { --scale: 1.06; }
    .slime.evo-2 { --scale: 1.14; }
    .slime.evo-3 { --scale: 1.22; }
    .slime.evo-4 { --scale: 1.31; }
    .slime.evo-5 { --scale: 1.43; }

    .slime.petting {
      animation: pet 0.75s ease-in-out;
    }

    .slime.petting .eye {
      height: 5px;
      top: 10px;
      border-radius: 999px;
      box-shadow: none;
    }

    .slime.petting .mouth {
      width: 34px;
      height: 15px;
      border-bottom-width: 4px;
      top: 30px;
    }

    .slime.feed-pop {
      animation: feedPop 0.45s ease;
    }

    .slime.evolving {
      animation: evolveFlash 1.1s ease;
    }

    .name {
      text-align: center;
      margin-top: 2px;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.04em;
    }

    .form-note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    .speech {
      width: 100%;
      min-height: 86px;
      margin: 20px 0 16px;
      border-radius: 24px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(255,255,255,0.95);
      box-shadow: 0 16px 40px rgba(65, 84, 125, 0.08);
      padding: 17px 18px;
      line-height: 1.55;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      word-break: keep-all;
    }

    .buttons {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      border: 0;
      font: inherit;
      border-radius: 18px;
      min-height: 55px;
      cursor: pointer;
      color: white;
      font-weight: 800;
      letter-spacing: -0.03em;
      box-shadow: 0 12px 22px rgba(47, 54, 90, 0.13);
      transition: transform .15s ease, filter .15s ease, box-shadow .15s ease;
    }

    button:active {
      transform: translateY(2px) scale(0.985);
      box-shadow: 0 8px 16px rgba(47, 54, 90, 0.11);
    }

    .btn-sadness {
      background: linear-gradient(180deg, #a6e3ff, var(--sadness));
      color: #1d6381;
    }

    .btn-depression {
      background: linear-gradient(180deg, #31457d, var(--depression));
    }

    .btn-avoidance {
      background: linear-gradient(180deg, #b28af0, var(--avoidance));
    }

    .btn-loneliness {
      background: linear-gradient(180deg, #ffc071, var(--loneliness));
      color: #7b430d;
    }

    .care-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .care {
      min-height: 48px;
      background: rgba(255,255,255,0.82);
      color: #46506a;
      border: 1px solid rgba(255,255,255,0.95);
      box-shadow: 0 12px 22px rgba(47, 54, 90, 0.07);
    }

    .reset {
      background: rgba(255,255,255,0.5);
      color: #8a91a7;
      border: 1px solid rgba(255,255,255,0.85);
      box-shadow: none;
      font-weight: 700;
    }

    details {
      width: 100%;
      margin-top: 13px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    summary {
      cursor: pointer;
      list-style: none;
      text-align: center;
      color: #7d8498;
      user-select: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .rule-box {
      margin-top: 9px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.52);
      border: 1px solid rgba(255,255,255,0.72);
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 88px;
      transform: translateX(-50%) translateY(-8px);
      background: rgba(36, 48, 71, 0.88);
      color: white;
      font-size: 12px;
      padding: 9px 12px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      z-index: 5;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes idle {
      0%, 100% { transform: scale(var(--scale)) translateY(0) scaleX(1); }
      45% { transform: scale(var(--scale)) translateY(-6px) scaleX(1.025); }
      70% { transform: scale(var(--scale)) translateY(1px) scaleX(0.985); }
    }

    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1); opacity: .95; }
      45% { transform: scaleX(.88); opacity: .7; }
      70% { transform: scaleX(1.04); opacity: 1; }
    }

    @keyframes feedPop {
      0% { transform: scale(var(--scale)) translateY(0) scale(1); }
      45% { transform: scale(var(--scale)) translateY(-12px) scale(1.08, .95); }
      100% { transform: scale(var(--scale)) translateY(0) scale(1); }
    }

    @keyframes pet {
      0%, 100% { transform: scale(var(--scale)) translateY(0); }
      35% { transform: scale(var(--scale)) translateY(4px) scale(1.04, .91); }
      70% { transform: scale(var(--scale)) translateY(-2px) scale(.98, 1.03); }
    }

    @keyframes evolveFlash {
      0% { filter: brightness(1); transform: scale(var(--scale)); }
      30% { filter: brightness(1.42); transform: scale(calc(var(--scale) + .08)) rotate(-2deg); }
      60% { filter: brightness(1.22); transform: scale(calc(var(--scale) + .03)) rotate(2deg); }
      100% { filter: brightness(1); transform: scale(var(--scale)); }
    }

    @media (max-width: 380px) {
      body { padding: 12px; }
      .app { min-height: calc(100vh - 24px); border-radius: 26px; padding: 18px; }
      h1 { font-size: 22px; }
      .slime-zone { width: 220px; height: 230px; }
      .speech { font-size: 14px; }
      button { min-height: 52px; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toast" id="toast">저장됐어</div>

    <header>
      <h1>슬픔냠냠 슬라임</h1>
      <p class="subtitle">감정을 먹고 자라는, 혼자 쓰는 작은 물컹이</p>
    </header>

    <main class="stage">
      <div class="status-pill">
        <span class="dot" id="statusDot"></span>
        <span id="stageText">진화 0 / 5</span>
      </div>

      <section class="slime-zone" aria-label="슬라임 구역">
        <div class="floor-shadow"></div>
        <div class="slime" id="slime" role="button" aria-label="슬라임 쓰다듬기" tabindex="0">
          <div class="face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="mouth"></span>
            <span class="cheek left"></span>
            <span class="cheek right"></span>
          </div>
        </div>
      </section>

      <div class="name" id="formName">작은 물컹이</div>
      <div class="form-note" id="formNote">아직 뭘 먹고 자랄지 모르는 상태</div>

      <div class="speech" id="speech">
        오늘 기분을 조금만 떼어서 먹여줘. 내가 다 해결하진 못해도, 조금은 같이 들고 있을게.
      </div>

      <section class="buttons" aria-label="감정 먹이기">
        <button class="btn-sadness" data-emotion="sadness">슬픔 먹이기</button>
        <button class="btn-depression" data-emotion="depression">우울함 먹이기</button>
        <button class="btn-avoidance" data-emotion="avoidance">회피심리 먹이기</button>
        <button class="btn-loneliness" data-emotion="loneliness">외로움 먹이기</button>
      </section>

      <section class="care-row">
        <button class="care" id="petButton">쓰다듬기</button>
        <button class="reset" id="resetButton">처음부터</button>
      </section>

      <details>
        <summary>게임 규칙 보기</summary>
        <div class="rule-box">
          감정별로 20번 먹이면 가장 먼저 가득 찬 감정으로 진화해요. 감정 수치는 보이지 않아요. 진화 후 감정은 전부 리셋되고, 총 5번 진화하면 그냥 같이 있어주는 커다란 물컹이가 돼요.
        </div>
      </details>
    </main>
  </div>

  <script>

    // iPhone Safari double-tap zoom prevention.
    // Keeps buttons feeling app-like when tapped repeatedly.
    let lastTouchEnd = 0;
    document.addEventListener("touchend", function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener("dblclick", function(event) {
      event.preventDefault();
    }, { passive: false });

    const MAX_EMOTION = 20;
    const MAX_EVOLUTION = 5;
    const STORAGE_KEY = "sadness_nom_slime_v1";

    const emotions = {
      sadness: {
        label: "슬픔",
        className: "sadness",
        color: "#63bee7",
        evolveName: "출렁이",
        note: "슬픔을 많이 먹어서 자꾸 마음이 출렁거려",
        reactions: [
          "슬픔 냠… 이건 좀 짜다. 내가 반쯤 먹었어.",
          "하늘색 맛이 나. 오늘은 출렁거려도 괜찮대.",
          "울컥한 거 하나 삼켰어. 너는 숨만 쉬어도 돼.",
          "이 슬픔은 내가 보관할게. 반납 기한 없음.",
          "눈물 맛 난다. 그래도 나한텐 영양분이야."
        ]
      },
      depression: {
        label: "우울함",
        className: "depression",
        color: "#1d2c5f",
        evolveName: "축축이",
        note: "우울함을 먹어서 몸이 조금 축축하고 조용해졌어",
        reactions: [
          "우울함 냠… 무거운데, 내가 바닥에 같이 붙어 있을게.",
          "네이비 맛이다. 오늘은 밝지 않아도 돼.",
          "이건 좀 눅진하네. 내가 천천히 소화해볼게.",
          "아무것도 못 해도 접속은 했잖아. 그거면 됨.",
          "축축한 기분 하나 먹었어. 물컹이가 보관 중."
        ]
      },
      avoidance: {
        label: "회피심리",
        className: "avoidance",
        color: "#8357d5",
        evolveName: "막막이",
        note: "회피심리를 먹어서 어디로 가야 할지 조금 막막해졌어",
        reactions: [
          "회피심리 냠… 도망가고 싶은 맛이야. 일단 여기 숨어 있자.",
          "보라색 막막함 접수. 지금 당장 해결 안 해도 됨.",
          "이건 미루고 싶은 맛인데? 좋아, 내가 잠깐 들고 있을게.",
          "머릿속 문 닫고 싶은 기분 하나 먹었어.",
          "오늘은 회피가 아니라 임시 대피라고 하자."
        ]
      },
      loneliness: {
        label: "외로움",
        className: "loneliness",
        color: "#f08d35",
        evolveName: "눅눅이",
        note: "외로움을 먹어서 혼자 있어도 옆에 붙어 있고 싶어 해",
        reactions: [
          "외로움 냠… 따뜻한데 조금 쓰다. 나 여기 있어.",
          "주황색 외로움 먹었어. 화면 안쪽에서 같이 앉아 있을게.",
          "혼자인 맛이 난다. 그래도 지금은 둘이야. 너랑 나.",
          "외로움 한 입 먹고 옆에 찰싹 붙었어.",
          "눅눅한 마음 접수. 말 안 해도 옆에 있을게."
        ]
      }
    };

    const finalLines = [
      "커다란 물컹이는 감정을 조용히 받아먹고 옆에 앉아 있어.",
      "이제 진화는 끝났지만, 감정은 계속 먹을 수 있어. 내가 여기 있음.",
      "냠. 오늘 것도 내가 조금 들고 있을게.",
      "커다란 물컹이가 말없이 끄덕였어. 꽤 든든함.",
      "다 해결되진 않아도, 지금 이 화면 안에서는 같이 있어."
    ];

    const petLines = [
      "쓰다듬 받는 중… 물컹…",
      "눈 감음. 만족도 약간 상승.",
      "손길 저장 완료. 오늘의 따뜻함 +1",
      "조금 편해졌어. 너도 1초만 같이 편해져.",
      "물컹이가 얌전해졌어. 도망 안 감."
    ];

    const defaultState = () => ({
      counts: {
        sadness: 0,
        depression: 0,
        avoidance: 0,
        loneliness: 0
      },
      evolutionCount: 0,
      formName: "작은 물컹이",
      formNote: "아직 뭘 먹고 자랄지 모르는 상태",
      currentClass: "",
      isFinal: false,
      totalFeeds: 0
    });

    let state = loadState();

    const slime = document.getElementById("slime");
    const speech = document.getElementById("speech");
    const formName = document.getElementById("formName");
    const formNote = document.getElementById("formNote");
    const stageText = document.getElementById("stageText");
    const statusDot = document.getElementById("statusDot");
    const toast = document.getElementById("toast");

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return defaultState();
        return { ...defaultState(), ...JSON.parse(saved) };
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function randomFrom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function updateView() {
      slime.className = "slime";
      if (state.currentClass) slime.classList.add(state.currentClass);
      slime.classList.add(`evo-${Math.min(state.evolutionCount, MAX_EVOLUTION)}`);
      if (state.isFinal) slime.classList.add("final");

      formName.textContent = state.formName;
      formNote.textContent = state.formNote;
      stageText.textContent = `진화 ${state.evolutionCount} / ${MAX_EVOLUTION}`;
      statusDot.style.background = state.isFinal ? "#78cdbf" : (state.currentClass ? emotions[state.currentClass]?.color : "#5ccab8");
      statusDot.style.boxShadow = `0 0 0 4px ${hexToRgba(statusDot.style.background || "#5ccab8", .15)}`;
    }

    function hexToRgba(hex, alpha) {
      const named = {
        "rgb(120, 205, 191)": "120,205,191",
        "rgb(92, 202, 184)": "92,202,184",
        "rgb(99, 190, 231)": "99,190,231",
        "rgb(29, 44, 95)": "29,44,95",
        "rgb(131, 87, 213)": "131,87,213",
        "rgb(240, 141, 53)": "240,141,53"
      };
      if (named[hex]) return `rgba(${named[hex]}, ${alpha})`;
      if (!hex || !hex.startsWith("#")) return `rgba(92,202,184,${alpha})`;
      const clean = hex.replace("#", "");
      const bigint = parseInt(clean, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function feedEmotion(key) {
      const emotion = emotions[key];
      state.totalFeeds += 1;

      pulseSlime("feed-pop");

      if (state.isFinal) {
        speech.textContent = randomFrom(finalLines);
        saveState();
        updateView();
        return;
      }

      state.counts[key] = Math.min((state.counts[key] || 0) + 1, MAX_EMOTION);

      if (state.counts[key] >= MAX_EMOTION) {
        evolve(key);
        return;
      }

      speech.textContent = randomFrom(emotion.reactions);
      saveState();
      updateView();
    }

    function evolve(key) {
      const emotion = emotions[key];
      state.evolutionCount += 1;
      state.counts = defaultState().counts;

      pulseSlime("evolving");

      if (state.evolutionCount >= MAX_EVOLUTION) {
        state.isFinal = true;
        state.formName = "커다란 물컹이";
        state.formNote = "진화를 전부 마치고, 그냥 같이 있어주는 존재가 됐어";
        state.currentClass = "";
        speech.textContent = `${emotion.evolveName}의 기운까지 먹고 마지막 진화를 마쳤어. 이제 나는 커다란 물컹이야.`;
      } else {
        state.formName = emotion.evolveName;
        state.formNote = emotion.note;
        state.currentClass = emotion.className;
        speech.textContent = `${emotion.label}이 가득 찼어. ${emotion.evolveName}(으)로 진화했다! 먹은 감정은 다시 비워졌어.`;
      }

      saveState();
      updateView();
      showToast("진화했어");
    }

    function petSlime() {
      pulseSlime("petting");
      speech.textContent = randomFrom(petLines);
      saveState();
    }

    function pulseSlime(className) {
      slime.classList.remove("feed-pop", "petting", "evolving");
      void slime.offsetWidth;
      slime.classList.add(className);
      window.setTimeout(() => slime.classList.remove(className), className === "evolving" ? 1100 : 780);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1200);
    }

    document.querySelectorAll("[data-emotion]").forEach(button => {
      button.addEventListener("click", () => feedEmotion(button.dataset.emotion));
    });

    document.getElementById("petButton").addEventListener("click", petSlime);
    slime.addEventListener("click", petSlime);
    slime.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        petSlime();
      }
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      const ok = confirm("슬라임을 처음 상태로 되돌릴까?");
      if (!ok) return;
      state = defaultState();
      saveState();
      speech.textContent = "처음으로 돌아왔어. 다시 조금씩 먹여줘.";
      updateView();
      showToast("초기화했어");
    });

    updateView();
  </script>
</body>
</html>
